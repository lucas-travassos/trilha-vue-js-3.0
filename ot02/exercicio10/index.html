<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OT02 - Carrinho de Compras</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, select { padding: 6px; margin-right: 8px; }
    button { padding: 6px 12px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #f4f4f4; }
    .btn-remover { background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 4px 10px; }
    .total { margin-top: 12px; font-weight: bold; font-size: 1.1em; }
    .sem-itens { color: #888; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <h2>Carrinho de Compras</h2>

    <div>
      <input v-model="novoItem.nome" placeholder="Nome do produto" />
      <input v-model.number="novoItem.preco" type="number" placeholder="Preço (R$)" min="0" />
      <input v-model.number="novoItem.quantidade" type="number" placeholder="Quantidade" min="1" />
      <button @click="adicionarItem">Adicionar</button>
    </div>

    <p v-if="carrinho.length === 0" class="sem-itens">Nenhum item no carrinho.</p>

    <table v-if="carrinho.length > 0">
      <thead>
        <tr>
          <th>#</th>
          <th>Produto</th>
          <th>Preço</th>
          <th>Quantidade</th>
          <th>Subtotal</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="(item, index) in carrinho" :key="index">
          <td>{{ index + 1 }}</td>
          <td>{{ item.nome }}</td>
          <td>R$ {{ item.preco.toFixed(2) }}</td>
          <td>{{ item.quantidade }}</td>
          <td>R$ {{ (item.preco * item.quantidade).toFixed(2) }}</td>
          <td><button class="btn-remover" @click="removerItem(index)">Remover</button></td>
        </tr>
      </tbody>
    </table>

    <p class="total" v-if="carrinho.length > 0">Total: R$ {{ totalCarrinho }}</p>
  </div>

  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          novoItem: { nome: '', preco: 0, quantidade: 1 },
          carrinho: []
        }
      },
      computed: {
        totalCarrinho() {
          return this.carrinho
            .reduce((total, item) => total + item.preco * item.quantidade, 0)
            .toFixed(2)
        }
      },
      methods: {
        adicionarItem() {
          if (!this.novoItem.nome.trim() || this.novoItem.preco <= 0 || this.novoItem.quantidade < 1) return
          this.carrinho.push({ ...this.novoItem })
          this.novoItem = { nome: '', preco: 0, quantidade: 1 }
        },
        removerItem(index) {
          this.carrinho.splice(index, 1)
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
