<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OT01 - Consulta de CEP</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { padding: 6px; margin-right: 8px; }
    button { padding: 6px 12px; cursor: pointer; }
    .resultado { margin-top: 16px; background: #f4f4f4; padding: 12px; border-radius: 6px; }
    p { margin: 4px 0; }
  </style>
</head>
<body>
  <div id="app">
    <h2>Consulta de CEP</h2>
    <input v-model="cep" placeholder="Digite o CEP" maxlength="8" />
    <button @click="buscarCep">Buscar</button>

    <p v-if="erro" style="color: red;">{{ erro }}</p>

    <div class="resultado" v-if="endereco">
      <p><strong>Logradouro:</strong> {{ endereco.logradouro }}</p>
      <p><strong>Bairro:</strong> {{ endereco.bairro }}</p>
      <p><strong>Cidade:</strong> {{ endereco.localidade }}</p>
      <p><strong>Estado:</strong> {{ endereco.uf }}</p>
    </div>
  </div>

  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          cep: '',
          endereco: null,
          erro: ''
        }
      },
      methods: {
        async buscarCep() {
          this.endereco = null
          this.erro = ''

          if (this.cep.length !== 8) {
            this.erro = 'CEP inválido. Digite 8 números.'
            return
          }

          try {
            const resposta = await axios.get(`https://viacep.com.br/ws/${this.cep}/json/`)
            if (resposta.data.erro) {
              this.erro = 'CEP não encontrado.'
            } else {
              this.endereco = resposta.data
            }
          } catch {
            this.erro = 'Erro ao buscar o CEP.'
          }
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
